<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Dimensional Shape Visualizer</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .controls {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
        }
        
        .control-group {
            margin-bottom: 15px;
        }
        
        label {
            display: inline-block;
            width: 120px;
            margin-right: 10px;
        }
        
        select, input, button {
            padding: 5px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 3px;
        }
        
        button {
            cursor: pointer;
            margin-right: 10px;
        }
        
        button:hover {
            background: #555;
        }
        
        canvas {
            border: 1px solid #333;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        
        canvas:active {
            cursor: grabbing;
        }
        
        body {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        
        .info {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            width: 100%;
            max-width: 800px;
        }
        
        .shape-info {
            color: #aaa;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>N-Dimensional Shape Visualizer</h1>
    
    <div class="controls">
        <form onsubmit="return false;">
            <div class="control-group">
                <label for="shape">Shape:</label>
                <select id="shape">
                    <option value="hypercube">Hypercube (2^n vertices)</option>
                    <option value="simplex">Simplex (n+1 vertices)</option>
                    <option value="cross_polytope">Cross Polytope (2n vertices)</option>
                    <option value="hypersphere">Hypersphere (point cloud)</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="dimension">Dimension:</label>
                <input type="number" id="dimension" min="2" max="20" value="3">
                <button type="button" onclick="generateShape()">Generate</button>
            </div>
            
            <div class="control-group">
                <button type="button" id="autoRotateBtn">Toggle Auto-Rotate</button>
                <button type="button" id="resetBtn">Reset Rotation</button>
            </div>
            
            <div class="control-group">
                <label for="mouseSensitivity">Mouse Sensitivity:</label>
                <input type="range" id="mouseSensitivity" min="0.001" max="0.05" step="0.001" value="0.01">
                <span id="sensitivityValue">0.01</span>
            </div>
        </form>
    </div>
    
    <canvas id="canvas" width="800" height="600"></canvas>
    
    <div class="info">
        <h3>Controls</h3>
        <p><strong>Mouse:</strong> Click and drag to rotate</p>
        <p><strong>Auto-Rotate:</strong> Toggle automatic rotation</p>
        <p><strong>Reset:</strong> Reset all rotations to initial state</p>
        <div class="shape-info" id="shapeInfo">
            Select a shape and dimension to begin
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        
        let vertices = [];
        let edges = [];
        let rotationAngles = {};
        let autoRotate = false;
        let mouseDragging = false;
        let lastMousePos = null;
        let mouseSensitivity = 0.01;
        let currentShape = 'hypercube';
        let currentDimension = 3;
        
        // Shape-specific colors
        const shapeColors = {
            hypercube: { vertex: '#ffffff', edge: '#64c8ff' },
            simplex: { vertex: '#ffc864', edge: '#ff9632' },
            cross_polytope: { vertex: '#64ffc8', edge: '#32c896' },
            hypersphere: { vertex: '#ff64ff', edge: '#c832c8' }
        };
        
        // Shape generation functions
        function generateHypercubeVertices(n) {
            const numVertices = Math.pow(2, n);
            const vertices = [];
            
            for (let i = 0; i < numVertices; i++) {
                const vertex = [];
                for (let j = 0; j < n; j++) {
                    vertex.push((i >> j) & 1 ? 1 : -1);
                }
                vertices.push(vertex);
            }
            
            return vertices;
        }
        
        function generateHypercubeEdges(vertices) {
            const edges = [];
            const n = vertices[0].length;
            
            for (let i = 0; i < vertices.length; i++) {
                for (let j = i + 1; j < vertices.length; j++) {
                    let diffCount = 0;
                    for (let k = 0; k < n; k++) {
                        if (vertices[i][k] !== vertices[j][k]) {
                            diffCount++;
                        }
                    }
                    if (diffCount === 1) {
                        edges.push([i, j]);
                    }
                }
            }
            
            return edges;
        }
        
        function generateSimplexVertices(n) {
            const vertices = [];
            
            for (let i = 0; i <= n; i++) {
                const vertex = new Array(n).fill(-1);
                if (i > 0) {
                    vertex[i - 1] = n;
                }
                // Normalize
                for (let j = 0; j < n; j++) {
                    vertex[j] = vertex[j] / n;
                }
                vertices.push(vertex);
            }
            
            return vertices;
        }
        
        function generateSimplexEdges(vertices) {
            const edges = [];
            
            for (let i = 0; i < vertices.length; i++) {
                for (let j = i + 1; j < vertices.length; j++) {
                    edges.push([i, j]);
                }
            }
            
            return edges;
        }
        
        function generateCrossPolytopeVertices(n) {
            const vertices = [];
            
            for (let i = 0; i < n; i++) {
                const posVertex = new Array(n).fill(0);
                const negVertex = new Array(n).fill(0);
                posVertex[i] = 1;
                negVertex[i] = -1;
                vertices.push(posVertex);
                vertices.push(negVertex);
            }
            
            return vertices;
        }
        
        function generateCrossPolytopeEdges(vertices) {
            const edges = [];
            const n = vertices[0].length;
            
            for (let i = 0; i < vertices.length; i++) {
                for (let j = i + 1; j < vertices.length; j++) {
                    // Check if vertices are not opposites
                    let isOpposite = false;
                    for (let k = 0; k < n; k++) {
                        if ((i === 2 * k && j === 2 * k + 1) || 
                            (i === 2 * k + 1 && j === 2 * k)) {
                            isOpposite = true;
                            break;
                        }
                    }
                    if (!isOpposite) {
                        edges.push([i, j]);
                    }
                }
            }
            
            return edges;
        }
        
        function generateHyperspherePoints(n, numPoints = 50) {
            const vertices = [];
            
            for (let i = 0; i < numPoints; i++) {
                const point = [];
                let sum = 0;
                
                // Generate random normal distribution
                for (let j = 0; j < n; j++) {
                    const val = gaussianRandom();
                    point.push(val);
                    sum += val * val;
                }
                
                // Normalize to unit sphere
                const norm = Math.sqrt(sum);
                for (let j = 0; j < n; j++) {
                    point[j] = point[j] / norm;
                }
                
                vertices.push(point);
            }
            
            return vertices;
        }
        
        function generateHypersphereEdges(vertices, maxDistance = 0.3) {
            const edges = [];
            
            for (let i = 0; i < vertices.length; i++) {
                for (let j = i + 1; j < vertices.length; j++) {
                    let distance = 0;
                    for (let k = 0; k < vertices[i].length; k++) {
                        const diff = vertices[i][k] - vertices[j][k];
                        distance += diff * diff;
                    }
                    distance = Math.sqrt(distance);
                    
                    if (distance <= maxDistance) {
                        edges.push([i, j]);
                    }
                }
            }
            
            return edges;
        }
        
        function gaussianRandom() {
            let u = 0, v = 0;
            while (u === 0) u = Math.random();
            while (v === 0) v = Math.random();
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        }
        
        function generateShape() {
            const shape = document.getElementById('shape').value;
            const dimension = parseInt(document.getElementById('dimension').value);
            
            currentShape = shape;
            currentDimension = dimension;
            
            // Clear previous rotations
            rotationAngles = {};
            
            // Generate vertices and edges based on shape
            switch (shape) {
                case 'hypercube':
                    vertices = generateHypercubeVertices(dimension);
                    edges = generateHypercubeEdges(vertices);
                    break;
                case 'simplex':
                    vertices = generateSimplexVertices(dimension);
                    edges = generateSimplexEdges(vertices);
                    break;
                case 'cross_polytope':
                    vertices = generateCrossPolytopeVertices(dimension);
                    edges = generateCrossPolytopeEdges(vertices);
                    break;
                case 'hypersphere':
                    vertices = generateHyperspherePoints(dimension, Math.min(50, Math.pow(2, dimension)));
                    edges = generateHypersphereEdges(vertices, 0.3);
                    break;
            }
            
            // Update shape info
            const info = document.getElementById('shapeInfo');
            info.innerHTML = `
                <strong>${shape.charAt(0).toUpperCase() + shape.slice(1)} (${dimension}D)</strong><br>
                Vertices: ${vertices.length}<br>
                Edges: ${edges.length}
            `;
        }
        
        function createRotationMatrix(n, axis1, axis2, angle) {
            const matrix = Array(n).fill().map(() => Array(n).fill(0));
            
            // Identity matrix
            for (let i = 0; i < n; i++) {
                matrix[i][i] = 1;
            }
            
            // Rotation in the specified plane
            matrix[axis1][axis1] = Math.cos(angle);
            matrix[axis2][axis2] = Math.cos(angle);
            matrix[axis1][axis2] = -Math.sin(angle);
            matrix[axis2][axis1] = Math.sin(angle);
            
            return matrix;
        }
        
        function rotatePoint(point, matrix) {
            const result = [];
            for (let i = 0; i < matrix.length; i++) {
                let sum = 0;
                for (let j = 0; j < point.length; j++) {
                    sum += point[j] * matrix[j][i];
                }
                result.push(sum);
            }
            return result;
        }
        
        function projectPoint(point) {
            if (point.length <= 2) {
                return [point[0] || 0, point[1] || 0];
            }
            
            const lastCoordinate = point[point.length - 1];
            const distance = 5.0;
            const factor = distance / Math.max(distance - lastCoordinate, 0.1);
            
            return [point[0] * factor, point[1] * factor];
        }
        
        function worldToScreen(x, y, scale) {
            return [
                x * scale + width / 2,
                y * scale + height / 2
            ];
        }
        
        function render() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            
            if (vertices.length === 0) return;
            
            // Apply rotations
            const rotatedVertices = vertices.map(vertex => {
                let rotated = [...vertex];
                for (const [axis1, axis2] of Object.keys(rotationAngles)) {
                    const [a1, a2] = axis1.split(',').map(Number);
                    const angle = rotationAngles[axis1];
                    const matrix = createRotationMatrix(rotated.length, a1, a2, angle);
                    rotated = rotatePoint(rotated, matrix);
                }
                return rotated;
            });
            
            // Project to 2D
            const projectedPoints = rotatedVertices.map(vertex => projectPoint(vertex));
            
            // Calculate scale based on dimension and shape
            let scale;
            if (currentShape === 'hypersphere') {
                scale = Math.max(100, 400 - (currentDimension * 3));
            } else if (currentShape === 'simplex') {
                scale = Math.max(80, 350 - (currentDimension * 2.5));
            } else if (currentShape === 'cross_polytope') {
                scale = Math.max(90, 380 - (currentDimension * 2.8));
            } else {
                scale = Math.max(50, 300 - (currentDimension * 2));
            }
            
            // Get colors for current shape
            const colors = shapeColors[currentShape];
            
            // Draw edges
            ctx.strokeStyle = colors.edge;
            ctx.lineWidth = currentShape === 'simplex' ? 3 : currentShape === 'hypersphere' ? 1 : 2;
            
            edges.forEach(edge => {
                const [i, j] = edge;
                const [x1, y1] = worldToScreen(...projectedPoints[i], scale);
                const [x2, y2] = worldToScreen(...projectedPoints[j], scale);
                
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            });
            
            // Draw vertices
            ctx.fillStyle = colors.vertex;
            const vertexRadius = currentShape === 'hypersphere' ? 2 : currentShape === 'simplex' ? 5 : 4;
            
            projectedPoints.forEach(point => {
                const [x, y] = worldToScreen(...point, scale);
                ctx.beginPath();
                ctx.arc(x, y, vertexRadius, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function animate() {
            if (autoRotate && vertices.length > 0) {
                // Auto-rotate first few axis pairs
                for (let i = 0; i < Math.min(currentDimension - 1, 3); i++) {
                    const key = `${i},${i + 1}`;
                    const speedFactor = Math.max(0.1, 1.0 - (i * 0.3));
                    rotationAngles[key] = (rotationAngles[key] || 0) + 0.01 * speedFactor;
                }
            }
            
            render();
            requestAnimationFrame(animate);
        }
        
        function toggleAutoRotate() {
            autoRotate = !autoRotate;
        }
        
        function resetRotation() {
            rotationAngles = {};
        }
        
        // Mouse controls
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                e.preventDefault();
                mouseDragging = true;
                lastMousePos = [e.clientX, e.clientY];
                autoRotate = false;
                canvas.style.cursor = 'grabbing';
            }
        });
        
        canvas.addEventListener('mouseup', (e) => {
            e.preventDefault();
            mouseDragging = false;
            lastMousePos = null;
            canvas.style.cursor = 'grab';
        });
        
        canvas.addEventListener('mousemove', (e) => {
            e.preventDefault();
            if (mouseDragging && lastMousePos) {
                const currentPos = [e.clientX, e.clientY];
                const dx = currentPos[0] - lastMousePos[0];
                const dy = currentPos[1] - lastMousePos[1];
                
                if (currentDimension >= 2) {
                    rotationAngles['0,1'] = (rotationAngles['0,1'] || 0) + dx * mouseSensitivity;
                }
                if (currentDimension >= 3) {
                    rotationAngles['1,2'] = (rotationAngles['1,2'] || 0) + dy * mouseSensitivity;
                }
                
                lastMousePos = currentPos;
            }
        });
        
        // Prevent context menu on right click
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });
        
        // Prevent drag start
        canvas.addEventListener('dragstart', (e) => {
            e.preventDefault();
        });
        
        // Mouse sensitivity control
        document.getElementById('mouseSensitivity').addEventListener('input', (e) => {
            mouseSensitivity = parseFloat(e.target.value);
            document.getElementById('sensitivityValue').textContent = mouseSensitivity.toFixed(3);
        });
        
        // Button event listeners
        document.getElementById('autoRotateBtn').addEventListener('click', (e) => {
            e.preventDefault();
            toggleAutoRotate();
        });
        
        document.getElementById('resetBtn').addEventListener('click', (e) => {
            e.preventDefault();
            resetRotation();
        });
        
        // Initialize with default shape
        generateShape();
        animate();
    </script>
</body>
</html>
